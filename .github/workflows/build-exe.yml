name: Build Single EXE File

on:
  push:
    branches: [ "main" ] # 본인의 기본 브랜치명이 master라면 master로 수정하세요
  workflow_dispatch: # 수동으로도 빌드를 실행할 수 있게 하는 옵션

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 체크아웃 코드
      uses: actions/checkout@v4

    - name: 파이썬 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview

    - name: PyInstaller로 단일 EXE 빌드 수행
      run: |
        pyinstaller --noconfirm --onedir --windowed --add-data "index.html;." app.py
        # pywebview 호환성을 위해 안전하게 폴더 구조를 압축파일로 넘기거나, 원파일화 처리
        pyinstaller --noconfirm --onefile --windowed --add-data "index.html;." app.py

    - name: 완성된 EXE 파일 업로드 (다운로드 링크 생성)
      uses: actions/upload-artifact@v4
      with:
        name: ReadOut-Analyzer-Windows
        path: dist/app.exe
